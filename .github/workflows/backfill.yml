name: Монблан — пересбор данных за период

on:
  workflow_dispatch:
    inputs:
      date_from:
        description: 'Начальная дата (YYYY-MM-DD)'
        required: true
        default: '2026-04-01'
      date_to:
        description: 'Конечная дата (YYYY-MM-DD, включительно). По умолчанию — вчера.'
        required: false
        default: ''
      trim_before:
        description: 'Удалить столбцы ДО этой даты (пусто — не удалять)'
        required: false
        default: '2026-04-01'

jobs:
  backfill:
    name: Пересбор iiko → Google Sheets
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: hotel-restaurant-processes

    env:
      IIKO_STORE_ID:               "82455"
      GOOGLE_SHEETS_ID:            ${{ secrets.GOOGLE_SHEETS_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      # MAX не нужен при пересборе — не рассылаем уведомления за старые даты
      MAX_BOT_TOKEN:               ""
      MAX_OWNER_USER_ID:           ""
      MAX_DEV_USER_ID:             ""

    steps:
      - uses: actions/checkout@v4

      - name: Настройка Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: hotel-restaurant-processes/requirements.txt

      - name: Установка зависимостей
        run: pip install -r requirements.txt

      - name: Удаление лишних столбцов (trim)
        if: ${{ github.event.inputs.trim_before != '' }}
        run: |
          echo "=== Удаляем столбцы до ${{ github.event.inputs.trim_before }} ==="
          python3 scripts/main.py trim "${{ github.event.inputs.trim_before }}"

      - name: Пересбор данных за период
        run: |
          DATE_FROM="${{ github.event.inputs.date_from }}"
          DATE_TO="${{ github.event.inputs.date_to }}"
          if [ -z "$DATE_TO" ]; then
            DATE_TO=$(date -u -d "5 hours" +%Y-%m-%d)  # вчера UTC+5
            DATE_TO=$(date -d "$DATE_TO - 1 day" +%Y-%m-%d)
          fi
          echo "Пересбор: $DATE_FROM → $DATE_TO"
          current="$DATE_FROM"
          while [ "$(date -d "$current" +%s)" -le "$(date -d "$DATE_TO" +%s)" ]; do
            echo "--- Сбор за $current ---"
            python3 scripts/main.py collect "$current" || echo "⚠️  Ошибка за $current — продолжаем"
            current=$(date -d "$current + 1 day" +%Y-%m-%d)
          done
          echo "=== Пересбор завершён ==="

      - name: Загрузка логов
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-log-${{ github.run_id }}
          path: hotel-restaurant-processes/logs/
          retention-days: 7
