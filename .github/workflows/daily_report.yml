name: Сбор данных Монблан (23:30)

on:
  schedule:
    # 23:30 UTC+5 = 18:30 UTC (основной запуск)
    - cron: '30 18 * * *'
    # 06:30 UTC+5 = 01:30 UTC (резервный — если смена закрыта после полуночи)
    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Дата отчёта (YYYY-MM-DD). Пусто = вчера'
        required: false
        default: ''

jobs:
  daily_collect:
    name: Сбор iiko → Google Sheets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: hotel-restaurant-processes

    env:
      # iikoWeb OLAP (основной источник данных)
      IIKO_WEB_LOGIN:              ${{ secrets.IIKO_WEB_LOGIN }}
      IIKO_WEB_PASSWORD:           ${{ secrets.IIKO_WEB_PASSWORD }}
      IIKO_STORE_ID:               ${{ secrets.IIKO_STORE_ID }}
      # Google Sheets
      GOOGLE_SHEETS_ID:            ${{ secrets.GOOGLE_SHEETS_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      # MAX мессенджер
      MAX_BOT_TOKEN:               ${{ secrets.MAX_BOT_TOKEN }}
      MAX_OWNER_USER_ID:           ${{ secrets.MAX_OWNER_USER_ID }}
      MAX_DEV_USER_ID:             ${{ secrets.MAX_DEV_USER_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Настройка Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: hotel-restaurant-processes/requirements.txt

      - name: Установка зависимостей
        run: pip install -r requirements.txt

      - name: Сбор данных iiko → Google Sheets
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python3 scripts/main.py collect "${{ github.event.inputs.date }}"
          else
            python3 scripts/main.py collect
          fi

      - name: Загрузка логов при ошибке
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-daily-${{ github.run_id }}
          path: hotel-restaurant-processes/logs/
          retention-days: 7
