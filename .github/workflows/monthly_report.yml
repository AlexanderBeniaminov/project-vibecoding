name: Монблан — ежемесячный отчёт

on:
  # 1-го числа каждого месяца в 15:00 МСК = 12:00 UTC (отчёт за предыдущий месяц)
  schedule:
    - cron: "0 12 1 * *"
  workflow_dispatch:
    inputs:
      month_date:
        description: "Дата внутри нужного месяца (YYYY-MM-DD). По умолчанию — прошлый месяц."
        required: false
        default: ""

jobs:
  monthly:
    name: Сбор iiko → ЕжеМесячный
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ресторан-монблан-отчёты

    env:
      IIKO_STORE_ID:               "82455"
      GOOGLE_SHEETS_ID:            ${{ secrets.GOOGLE_SHEETS_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      IIKO_WEB_PASSWORD:           ${{ secrets.IIKO_WEB_PASSWORD }}
      MAX_BOT_TOKEN:               ${{ secrets.MAX_BOT_TOKEN }}
      MAX_DEV_USER_ID:             ${{ secrets.MAX_OWNER_USER_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Настройка Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ресторан-монблан-отчёты/requirements.txt

      - name: Установка зависимостей
        run: pip install -r requirements.txt

      - name: Сбор данных iiko → ЕжеМесячный
        run: |
          if [ -n "${{ github.event.inputs.month_date }}" ]; then
            python3 scripts/main.py monthly "${{ github.event.inputs.month_date }}"
          else
            python3 scripts/main.py monthly
          fi

      - name: Загрузка логов при ошибке
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-monthly-${{ github.run_id }}
          path: ресторан-монблан-отчёты/logs/
          retention-days: 7
