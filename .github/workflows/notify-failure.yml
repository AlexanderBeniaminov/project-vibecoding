name: Алерт — сбой воркфлоу

on:
  workflow_run:
    workflows:
      - "Сбор данных Монблан (04:00)"
      - "Монблан — еженедельный дайджест"
      - "Монблан — ежемесячный отчёт"
      - "AI Hotel Agents"
    types:
      - completed

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Telegram — алерт о сбое
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_OWNER_ID }}
        run: |
          WORKFLOW="${{ github.event.workflow_run.name }}"
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          TEXT="❌ Сбой GitHub Actions%0A%0AВоркфлоу: ${WORKFLOW}%0AЛоги: ${RUN_URL}"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}&text=${TEXT}"
