name: Монблан — еженедельный дайджест

on:
  schedule:
    # 02:00 UTC = 07:00 UTC+5 каждый понедельник
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      date:
        description: 'Любая дата из нужной недели (YYYY-MM-DD). Пусто = прошлая неделя.'
        required: false
        default: ''

jobs:
  weekly:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hotel-restaurant-processes

    steps:
      - uses: actions/checkout@v4

      - name: Установить Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: hotel-restaurant-processes/requirements.txt

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: Запустить еженедельный дайджест
        env:
          IIKO_API_LOGIN:              ${{ secrets.IIKO_API_LOGIN }}
          IIKO_ORG_ID:                 ${{ secrets.IIKO_ORG_ID }}
          GOOGLE_SHEETS_ID:            ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          MAX_BOT_TOKEN:               ${{ secrets.MAX_BOT_TOKEN }}
          MAX_OWNER_USER_ID:           ${{ secrets.MAX_OWNER_USER_ID }}
          MAX_ADMIN_USER_ID:           ${{ secrets.MAX_ADMIN_USER_ID }}
          MAX_DEV_USER_ID:             ${{ secrets.MAX_DEV_USER_ID }}
        run: |
          DATE_ARG="${{ github.event.inputs.date }}"
          if [ -n "$DATE_ARG" ]; then
            python3 scripts/main.py weekly "$DATE_ARG"
          else
            python3 scripts/main.py weekly
          fi

      - name: Сохранить лог
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-log-${{ github.run_id }}
          path: hotel-restaurant-processes/logs/
          retention-days: 30
