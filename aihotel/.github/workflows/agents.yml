name: AI Hotel Agents

on:
  # Ручной запуск из GitHub UI (для тестов и отладки)
  workflow_dispatch:
    inputs:
      agent:
        description: 'Какой агент запустить'
        required: true
        type: choice
        options:
          - travelline_collector
          - agent1_analyst
          - agent2_strategist
          - agent3_notify_owner
          - agent3_check_digest
          - agent3_send_tasks
          - agent3_remind

  schedule:
    # Все времена UTC. Москва = UTC+3
    # ─── Понедельник ───────────────────────────────────────────
    - cron: '0 12 * * 1'   # Пн 12:00 UTC = Пн 15:00 МСК → remind: внести данные до 22:00
    - cron: '0 17 * * 1'   # Пн 17:00 UTC = Пн 20:00 МСК → TravelLine Collector (до Агента 1)
    - cron: '0 19 * * 1'   # Пн 19:00 UTC = Пн 22:00 МСК → Агент 1 попытка 1 (TG Александру если пусто)
    - cron: '0 20 * * 1'   # Пн 20:00 UTC = Пн 23:00 МСК → Агент 1 попытка 2 (email Виктору)
    - cron: '0 21 * * 1'   # Пн 21:00 UTC = Вт 00:00 МСК → Агент 1 попытка 3 (email Виктору)
    - cron: '0 22 * * 1'   # Пн 22:00 UTC = Вт 01:00 МСК → Агент 1 попытка 4, анализ не запускается
    # ─── Вторник ───────────────────────────────────────────────
    - cron: '0 2 * * 2'    # Вт 02:00 UTC = Вт 05:00 МСК → Агент 2 (формирует задачи)
    - cron: '0 4 * * 2'    # Вт 04:00 UTC = Вт 07:00 МСК → Агент 3 notify_owner
    - cron: '0 6 * * 2'    # Вт 06:00 UTC = Вт 09:00 МСК → проверка дайджеста (нет → email+TG)
    - cron: '0 8 * * 2'    # Вт 08:00 UTC = Вт 11:00 МСК → send_tasks проверка 1
    - cron: '0 10 * * 2'   # Вт 10:00 UTC = Вт 13:00 МСК → send_tasks проверка 2
    - cron: '0 12 * * 2'   # Вт 12:00 UTC = Вт 15:00 МСК → send_tasks проверка 3
    - cron: '0 14 * * 2'   # Вт 14:00 UTC = Вт 17:00 МСК → send_tasks проверка 4
    # ─── Четверг ───────────────────────────────────────────────
    - cron: '0 9 * * 4'    # Чт 09:00 UTC = Чт 12:00 МСК → remind: обновить статусы задач

env:
  ROUTERAI_API_KEY: ${{ secrets.ROUTERAI_API_KEY }}
  ROUTERAI_BASE_URL: https://routerai.ru/api/v1
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
  FINANCE_SHEET_ID: ${{ secrets.FINANCE_SHEET_ID }}
  STRATEGY_SHEET_ID: ${{ secrets.STRATEGY_SHEET_ID }}
  MAX_BOT_TOKEN: ${{ secrets.MAX_BOT_TOKEN }}
  MAX_OWNER_ID: ${{ secrets.MAX_OWNER_USER_ID }}
  MAX_TEAM_IDS: ${{ secrets.MAX_TEAM_IDS }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_OWNER_ID: ${{ secrets.TELEGRAM_OWNER_ID }}
  VIKTOR_EMAIL: ${{ secrets.VIKTOR_EMAIL }}
  GMAIL_USER: ${{ secrets.GMAIL_USER }}
  GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
  TL_CLIENT_ID: ${{ secrets.TL_CLIENT_ID }}
  TL_CLIENT_SECRET: ${{ secrets.TL_CLIENT_SECRET }}
  TL_PROPERTY_ID: ${{ secrets.TL_PROPERTY_ID }}

jobs:
  run-agents:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # === Автоматические запуски по расписанию ===

      - name: Напоминание Пн 15:00 МСК — внести данные до 22:00
        if: github.event_name == 'schedule' && github.event.schedule == '0 12 * * 1'
        run: python agents/agent3_dispatcher.py remind

      - name: TravelLine Collector — Пн 20:00 МСК
        if: github.event_name == 'schedule' && github.event.schedule == '0 17 * * 1'
        run: python travelline_collector.py

      - name: Агент 1 — попытка 1, Пн 22:00 МСК (TG Александру если пусто)
        if: github.event_name == 'schedule' && github.event.schedule == '0 19 * * 1'
        run: python agents/agent1_analyst.py --attempt 1

      - name: Агент 1 — попытка 2, Пн 23:00 МСК (email Виктору)
        if: github.event_name == 'schedule' && github.event.schedule == '0 20 * * 1'
        run: python agents/agent1_analyst.py --attempt 2

      - name: Агент 1 — попытка 3, Вт 00:00 МСК (email Виктору)
        if: github.event_name == 'schedule' && github.event.schedule == '0 21 * * 1'
        run: python agents/agent1_analyst.py --attempt 3

      - name: Агент 1 — попытка 4 финальная, Вт 01:00 МСК (анализ не запускается)
        if: github.event_name == 'schedule' && github.event.schedule == '0 22 * * 1'
        run: python agents/agent1_analyst.py --attempt 4

      - name: Агент 2 — Стратег, Вт 05:00 МСК
        if: github.event_name == 'schedule' && github.event.schedule == '0 2 * * 2'
        run: python agents/agent2_strategist.py

      - name: Агент 3 — Уведомление собственника, Вт 07:00 МСК
        if: github.event_name == 'schedule' && github.event.schedule == '0 4 * * 2'
        run: python agents/agent3_dispatcher.py notify_owner

      - name: Агент 3 — Проверка дайджеста, Вт 09:00 МСК
        if: github.event_name == 'schedule' && github.event.schedule == '0 6 * * 2'
        run: python agents/agent3_dispatcher.py check_digest

      - name: Агент 3 — Проверка задач (Вт 11:00–17:00 МСК)
        if: >
          github.event_name == 'schedule' && (
            github.event.schedule == '0 8 * * 2' ||
            github.event.schedule == '0 10 * * 2' ||
            github.event.schedule == '0 12 * * 2' ||
            github.event.schedule == '0 14 * * 2'
          )
        run: python agents/agent3_dispatcher.py send_tasks

      - name: Напоминание Чт 12:00 МСК — обновить статусы
        if: github.event_name == 'schedule' && github.event.schedule == '0 9 * * 4'
        run: python agents/agent3_dispatcher.py remind

      # === Ручной запуск через workflow_dispatch ===

      - name: Ручной запуск — TravelLine Collector
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.agent == 'travelline_collector'
        run: python travelline_collector.py

      - name: Ручной запуск — Агент 1
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.agent == 'agent1_analyst'
        run: python agents/agent1_analyst.py

      - name: Ручной запуск — Агент 2
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.agent == 'agent2_strategist'
        run: python agents/agent2_strategist.py

      - name: Ручной запуск — Агент 3 notify_owner
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.agent == 'agent3_notify_owner'
        run: python agents/agent3_dispatcher.py notify_owner

      - name: Ручной запуск — Агент 3 check_digest
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.agent == 'agent3_check_digest'
        run: python agents/agent3_dispatcher.py check_digest

      - name: Ручной запуск — Агент 3 send_tasks
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.agent == 'agent3_send_tasks'
        run: python agents/agent3_dispatcher.py send_tasks

      - name: Ручной запуск — Агент 3 remind
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.agent == 'agent3_remind'
        run: python agents/agent3_dispatcher.py remind
