name: Утренний отчёт Монблан (10:00)

on:
  schedule:
    # 10:00 UTC+5 = 05:00 UTC
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Дата отчёта (YYYY-MM-DD). Пусто = вчера'
        required: false
        default: ''

jobs:
  morning_report:
    name: Чтение Sheets → отчёт в MAX
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      # Google Sheets
      GOOGLE_SHEETS_ID:            ${{ secrets.GOOGLE_SHEETS_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      # MAX мессенджер
      MAX_BOT_TOKEN:               ${{ secrets.MAX_BOT_TOKEN }}
      MAX_OWNER_USER_ID:           ${{ secrets.MAX_OWNER_USER_ID }}
      MAX_DEV_USER_ID:             ${{ secrets.MAX_DEV_USER_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Настройка Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: hotel-restaurant-processes/requirements.txt

      - name: Установка зависимостей
        run: pip install -r hotel-restaurant-processes/requirements.txt

      - name: Отправка отчёта в MAX
        working-directory: hotel-restaurant-processes
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python scripts/main.py report "${{ github.event.inputs.date }}"
          else
            python scripts/main.py report
          fi

      - name: Загрузка логов при ошибке
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-morning-${{ github.run_id }}
          path: hotel-restaurant-processes/logs/
          retention-days: 7
