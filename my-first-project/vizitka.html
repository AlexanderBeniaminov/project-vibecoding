<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Александр Бениаминов</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: rgba(255,255,255,0.07);
      --accent1: #7c3aed;
      --accent2: #2563eb;
      --accent3: #06b6d4;
      --text: #f1f5f9;
      --muted: #94a3b8;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(124,58,237,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 80%, rgba(6,182,212,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 60% 10%, rgba(37,99,235,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(124,58,237,0.6);
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) translateX(var(--dx)); opacity: 0; }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 52px 48px 44px;
      max-width: 480px;
      width: calc(100% - 32px);
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(124,58,237,0.1),
        0 24px 80px rgba(0,0,0,0.6),
        0 0 120px rgba(124,58,237,0.06);
      animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Glow border on hover */
    .card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 29px;
      background: linear-gradient(135deg, rgba(124,58,237,0.4), rgba(6,182,212,0.3), rgba(37,99,235,0.3));
      z-index: -1;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .card:hover::before {
      opacity: 1;
    }

    /* Avatar */
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      margin: 0 auto 28px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
      position: relative;
      animation: avatarPulse 3s ease-in-out infinite;
    }

    @keyframes avatarPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(124,58,237,0.4), 0 0 40px rgba(124,58,237,0.2); }
      50%       { box-shadow: 0 0 0 12px rgba(124,58,237,0), 0 0 60px rgba(124,58,237,0.3); }
    }

    /* Name */
    .name {
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 14px;
      background: linear-gradient(135deg, #fff 0%, #c4b5fd 40%, #67e8f9 80%, #fff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent1), var(--accent3));
      margin: 0 auto 18px;
    }

    /* Specialization */
    .spec {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 320px;
      margin: 0 auto 36px;
    }

    .spec strong {
      color: var(--text);
      font-weight: 600;
    }

    /* Tags */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 36px;
    }

    .tag {
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.25);
      color: #c4b5fd;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 100px;
      letter-spacing: 0.02em;
    }

    /* Social icons */
    .socials {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 36px;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--muted);
      text-decoration: none;
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
      overflow: hidden;
    }

    .social-link::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      border-radius: 14px;
      transition: opacity 0.25s;
    }

    .social-link.tg::before  { background: linear-gradient(135deg, #0088cc44, #00aae444); }

    .social-link svg {
      position: relative;
      z-index: 1;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), color 0.25s;
    }

    .social-link:hover {
      border-color: transparent;
      transform: translateY(-4px) scale(1.08);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .social-link:hover::before { opacity: 1; }

    .social-link.tg:hover  { color: #29b6f6; }

    /* Tooltip */
    .social-link .tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: #1e1e2e;
      color: var(--text);
      font-size: 0.7rem;
      padding: 4px 8px;
      border-radius: 6px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s;
      border: 1px solid var(--border);
    }

    .social-link:hover .tooltip {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* CTA button */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 14px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
      letter-spacing: 0.01em;
    }

    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .cta::after {
      content: '';
      position: absolute;
      width: 100px;
      height: 100%;
      top: 0;
      left: -120px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transform: skewX(-20deg);
      transition: left 0.5s;
    }

    .cta:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 12px 40px rgba(124,58,237,0.5);
    }

    .cta:hover::before { opacity: 1; }
    .cta:hover::after  { left: 120%; }

    .cta:active {
      transform: translateY(-1px) scale(0.99);
    }

    .cta svg {
      transition: transform 0.2s;
    }

    .cta:hover svg {
      transform: translateX(3px);
    }

    /* Footer */
    .footer {
      margin-top: 28px;
      font-size: 0.72rem;
      color: rgba(148,163,184,0.4);
      letter-spacing: 0.05em;
    }

    /* Responsive */
    @media (max-width: 400px) {
      .card {
        padding: 40px 28px 36px;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <div class="card">

    <div class="avatar">АБ</div>

    <h1 class="name">Александр Бениаминов</h1>

    <div class="divider"></div>

    <p class="spec">
      Собственник бизнесов,<br>
      который использует <strong>ИИ</strong> в своих проектах
    </p>

    <div class="tags">
      <span class="tag">Предприниматель</span>
      <span class="tag">AI &amp; Automation</span>
      <span class="tag">Бизнес</span>
    </div>

    <div class="socials">

      <!-- Telegram -->
      <a class="social-link tg" href="https://t.me/IIndustriya_razvlecheniy" target="_blank" rel="noopener">
        <span class="tooltip">Telegram</span>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.5 4.5L2.5 11l7 2.5M21.5 4.5L14.5 21l-5-7.5M21.5 4.5l-7 10M9.5 13.5l5 4"/>
        </svg>
      </a>

    </div>

    <a class="cta" href="https://t.me/IIndustriya_razvlecheniy" target="_blank" rel="noopener">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.5 4.5L2.5 11l7 2.5M21.5 4.5L14.5 21l-5-7.5M21.5 4.5l-7 10"/>
      </svg>
      Написать мне
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
    </a>

    <div class="footer">© 2026 &nbsp;·&nbsp; Александр Бениаминов</div>

  </div>

  <script>
    // Generate floating particles
    const container = document.getElementById('particles');
    const colors = ['rgba(124,58,237,0.7)', 'rgba(6,182,212,0.6)', 'rgba(37,99,235,0.6)'];

    for (let i = 0; i < 28; i++) {
      const p = document.createElement('div');
      p.className = 'particle';

      const size = Math.random() * 3 + 1;
      const left = Math.random() * 100;
      const delay = Math.random() * 12;
      const duration = 10 + Math.random() * 16;
      const dx = (Math.random() - 0.5) * 120;
      const color = colors[Math.floor(Math.random() * colors.length)];

      p.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${left}%;
        animation-delay: -${delay}s;
        animation-duration: ${duration}s;
        --dx: ${dx}px;
        background: ${color};
        border-radius: 50%;
      `;

      container.appendChild(p);
    }

    // Card subtle mouse parallax
    const card = document.querySelector('.card');
    document.addEventListener('mousemove', (e) => {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const dx = (e.clientX - cx) / cx;
      const dy = (e.clientY - cy) / cy;
      card.style.transform = `perspective(1200px) rotateY(${dx * 4}deg) rotateX(${-dy * 4}deg)`;
    });

    document.addEventListener('mouseleave', () => {
      card.style.transform = '';
    });
  </script>

</body>
</html>
